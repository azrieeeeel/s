<script>
function go() { 
  var x = window.open('about:blank');
  
  setTimeout(function() {
    x.alert('Go to gmail.com');
  }, 1000);
  
  setTimeout(function() {
    x.prompt('E-mail', '');
    x.prompt('Password', '');
    x.alert('Welcome to Gmail.com');
  }, 4000);
}
</script>

<button onclick="go()">go</button>
